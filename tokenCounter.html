<!DOCTYPE html>
<html lang="en">
    <head> 
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Token Counter</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <h1>Token Counter</h1>
        </header>
        <nav>
            <ul>
                <li>
                    <a href="index.html">Dashboard</a>
                </li>
                <li>
                    <a href="how-it-works.html">How it works?</a>
                </li>
                <li>
                    <a href="tokenCounter.html">Token Counter</a>
                </li>
            </ul>
        </nav>
        <main>
            <section id="tokenCounter">
                <h2>Token Counter</h2>
                <p>Paste any English text below to estimate how many tokens it would consume when sent to an AI model.</p>
                <textarea id="inputText" rows="6" placeholder="Type or paste your text here..."></textarea>
                <p id="result">Estimated tokens: 0</p>
                <div id="stats">
                    <span id="stat-chars" class="stat-card">Characters: 0</span>
                    <span id="stat-words" class="stat-card">Words: 0</span>
                    <span id="stat-tokens" class="stat-card">Estimated tokens: 0</span>
                </div>
                <button id="save-btn" disabled>Save Snapshot</button>
                <ul id="history-list"></ul>
                <button id="clear-btn">Clear History List</button>
            </section>
        </main>
        <footer>
            <p>Sources: <a href="https://artificialanalysis.ai/">Artificial Analysis</a></p>
        </footer>
  </body>
  <script type="module" src="dom.js"></script>
</html>
